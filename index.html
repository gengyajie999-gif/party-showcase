<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>党建展示网页</title>
  <style>
    :root{
      --red1:#8b0000; --red2:#c1121f; --red3:#d62828;
      --gold:#d4a017; --blue:#1d4ed8; --orange:#ea580c; --green:#15803d; --red:#b91c1c;
      --text:#1f2937; --muted:#6b7280; --line:#e5e7eb; --card:#fff;
      --shadow:0 10px 24px rgba(0,0,0,.08); --radius:18px; --maxw:1180px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:"Microsoft YaHei","PingFang SC",Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,#fff8f7 0%,#fff 28%,#fff 100%)}
    a{text-decoration:none;color:inherit}
    img{display:block;max-width:100%}
    .hero{
      min-height:68vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px 20px;color:#fff;
      background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,.12), transparent 28%),
      radial-gradient(circle at 80% 10%, rgba(255,255,255,.08), transparent 24%),
      linear-gradient(135deg, var(--red1), var(--red2) 56%, var(--red3));
      position:relative;overflow:hidden
    }
    .hero::after{content:"";position:absolute;inset:auto -10% -120px -10%;height:220px;background:rgba(255,255,255,.08);transform:rotate(-3deg);filter:blur(10px)}
    .hero-inner{max-width:920px;position:relative;z-index:1}
    .eyebrow{letter-spacing:.28em;font-size:14px;opacity:.9;margin-bottom:18px}
    h1{margin:0 0 16px;font-size:clamp(34px,6vw,68px);line-height:1.1}
    .subtitle{margin:0 auto 14px;font-size:clamp(18px,2.2vw,28px);opacity:.95}
    .slogan{margin-top:22px;display:inline-block;padding:12px 20px;border:1px solid rgba(255,255,255,.24);border-radius:999px;background:rgba(255,255,255,.08)}
    .container{width:min(var(--maxw),calc(100% - 32px));margin:0 auto}
    .section{padding:48px 0 18px}
    .section-title{display:flex;align-items:center;gap:14px;margin-bottom:18px}
    .section-title h2{margin:0;font-size:clamp(24px,3vw,34px)}
    .line{flex:1;height:1px;background:linear-gradient(90deg,rgba(185,28,28,.4),rgba(185,28,28,0))}
    .section-desc{margin:0 0 24px;color:var(--muted);line-height:1.8}
    .notice{padding:14px 16px;background:#fff5f5;border:1px solid #fecaca;border-radius:14px;color:#7f1d1d;line-height:1.8;margin-bottom:20px}
    .nav-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
    .nav-card{position:relative;min-height:180px;border-radius:18px;overflow:hidden;box-shadow:var(--shadow);border:1px solid #f1f5f9;display:flex}
    .nav-bg{position:absolute;inset:0;background-size:cover;background-position:center}
    .nav-overlay{position:absolute;inset:0;background:linear-gradient(rgba(0,0,0,.20),rgba(0,0,0,.46))}
    .nav-content{position:relative;z-index:1;padding:18px;color:#fff;display:flex;flex-direction:column;width:100%}
    .nav-tag{width:50px;height:50px;border-radius:15px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700}
    .nav-card h3{margin:12px 0 8px;font-size:22px}
    .nav-card p{margin:0;color:rgba(255,255,255,.92);line-height:1.7;font-size:14px}
    .jump{margin-top:auto;font-weight:700}
    .theme-card{background:#fff;border-radius:22px;box-shadow:var(--shadow);padding:22px;margin-bottom:22px;border:1px solid #f6e9e7}
    .theme-header{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px}
    .theme-title-wrap{display:flex;align-items:center;gap:14px}
    .theme-badge{width:52px;height:52px;border-radius:16px;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;flex-shrink:0}
    .theme-header h3{margin:0 0 6px;font-size:28px}
    .theme-header p{margin:0;color:var(--muted);line-height:1.8}
    .photo-wall{columns:3 260px;column-gap:16px}
    .photo-item{break-inside:avoid;margin-bottom:16px;background:#fff;border-radius:18px;overflow:hidden;border:1px solid #eef2f7;box-shadow:0 8px 18px rgba(0,0,0,.06);cursor:pointer;transition:.18s}
    .photo-item:hover{transform:translateY(-2px);box-shadow:0 12px 22px rgba(0,0,0,.09)}
    .photo-item img{width:100%;aspect-ratio:4/3;object-fit:cover;background:#f8fafc}
    .photo-meta{padding:12px 14px 14px}
    .photo-title{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.5}
    .photo-sub{color:var(--muted);font-size:13px;line-height:1.6}
    .video-box{margin-top:18px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:18px;padding:16px}
    .video-box h4{margin:0 0 12px}
    .video-box p{margin:0 0 12px;color:var(--muted);line-height:1.7}
    .video-poster-wrap{position:relative;border-radius:12px;overflow:hidden;cursor:pointer}
    .video-poster-wrap img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover}
    .video-play-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(rgba(0,0,0,.18),rgba(0,0,0,.28));color:#fff;font-size:18px;font-weight:700}
    .video-box video{width:100%;border-radius:12px;background:#000}
    .posts-wrap{display:grid;gap:14px}
    .post-card{background:#fff;border:1px solid #eef2f7;border-radius:16px;padding:18px;box-shadow:0 8px 16px rgba(0,0,0,.05);display:grid;grid-template-columns:120px 1fr auto;gap:16px;align-items:center}
    .post-date{color:var(--muted);font-weight:700}
    .post-main h4{margin:0 0 8px;color:var(--blue);font-size:18px}
    .post-main p{margin:0;color:var(--muted);line-height:1.7;font-size:14px}
    .post-link{color:var(--red2);font-weight:700;white-space:nowrap}
    .footer{margin-top:40px;padding:28px 0 46px;color:var(--muted);border-top:1px solid var(--line);text-align:center;line-height:1.9}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.56);display:none;align-items:center;justify-content:center;padding:20px;z-index:999}
    .modal.show{display:flex}
    .modal-card{width:min(960px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:24px;box-shadow:0 24px 60px rgba(0,0,0,.24);position:relative}
    .close-btn{position:sticky;top:14px;margin-left:auto;margin-right:14px;width:42px;height:42px;border:0;border-radius:50%;background:rgba(255,255,255,.95);box-shadow:0 6px 18px rgba(0,0,0,.15);cursor:pointer;font-size:22px;z-index:10}
    .modal-body{padding:0 22px 26px}
    .modal-image{width:100%;height:auto;max-height:70vh;object-fit:contain;border-radius:18px;background:#f8fafc;margin-top:-10px;display:block}
    .meta-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px 18px;margin:18px 0 8px}
    .meta-item{background:#fafafa;border:1px solid #f0f0f0;border-radius:14px;padding:12px 14px}
    .meta-item .label{color:var(--muted);font-size:13px;margin-bottom:6px}
    .meta-item .value{font-size:15px;line-height:1.7}
    .voice-box,.text-box,.link-box,.audio-box{margin-top:14px;border-radius:16px;padding:16px 18px}
    .voice-box{background:linear-gradient(135deg,#fff7ed,#fff);border:1px solid #ffedd5;line-height:1.85}
    .text-box{background:#fff;border:1px solid #eef2f7;line-height:1.85}
    .link-box{background:#f8fafc;border:1px dashed #cbd5e1}
    .audio-box{background:#fff7f7;border:1px solid #fecaca}
    .voice-box h5,.text-box h5,.link-box h5,.audio-box h5{margin:0 0 10px;font-size:16px}
    .link-box a{color:var(--blue);font-weight:700}
    .audio-box audio{width:100%;margin-top:8px}
    .hint{font-size:13px;color:var(--muted);line-height:1.7}
    @media (max-width:980px){.nav-grid{grid-template-columns:repeat(2,1fr)}.post-card{grid-template-columns:1fr}.meta-grid{grid-template-columns:1fr}}
    @media (max-width:640px){.hero{min-height:58vh}.nav-grid{grid-template-columns:1fr}.theme-card{padding:18px}.theme-header{flex-direction:column}.photo-wall{columns:1}.modal-body{padding:0 14px 18px}}
  </style>
</head>
<body>
  <header class="hero" id="top">
    <div class="hero-inner">
      <div class="eyebrow">WATER · PARTY · YOUTH</div>
      <h1>江河之上·党旗之下</h1>
      <p class="subtitle">水利工程专业研究生第六党支部风采展</p>
      <div class="slogan">支部故事映初心·青春奋进担使命</div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <div class="section-title"><h2>五大主题板块</h2><div class="line"></div></div>
        <div class="nav-grid" id="navGrid"></div>
      </div>
    </section>

    <section class="section">
      <div class="container" id="themeContainer"></div>
    </section>

    <section class="section" id="posts">
      <div class="container">
        <div class="section-title"><h2>支部之声 · 往期推文</h2><div class="line"></div></div>
        <p class="section-desc">点击标题即可跳转阅读。推文按发布时间倒序排列，便于集中查阅支部往期宣传成果。</p>
        <div class="posts-wrap" id="postList"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div>水利工程专业研究生第六党支部</div>
      <div>土木与水利工程学院</div>
      <div><a href="#top" style="color:#b91c1c;font-weight:700;">返回顶部</a></div>
    </div>
  </footer>

  <div class="modal" id="modal">
    <div class="modal-card">
      <button class="close-btn" id="closeBtn" aria-label="关闭">×</button>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <audio id="themeAudio" preload="none"></audio>

  <script>
    const themeConfig = [
      {

        desc: '聚焦主题党日、理论学习、读书交流与党性教育，展现支部成员在学思践悟中筑牢理想信念、强化使命担当',
        audio: 'audio/zhu/zhu1.mp3',
        video: {

          src: 'videos/zhu/zhu.mp4',

        },
        photos: [
          { title:'2026年4月主题党日', sub:'主题党日 · 理论学习', thumb:'images/zhu/zhu_11.png', full:'images/zhu/zhu_11.png', time:'2026年4月23日', location:'西六楼五楼报告厅（516）',  intro:'本次二十届四中全会精神专题宣讲活动，邀请华中科技大学研究生红色理论学讲团讲师进行专题授课，面向支部全体党员及学院研究生代表开展。宣讲围绕二十届四中全会的核心要义与战略部署，结合理论分析与实践案例，系统解读全会提出的新思想、新论断、新要求。活动现场学习氛围浓厚，党员们认真聆听、积极交流，进一步深化了对全会精神的理解，增强了在新时代新征程上勇担使命、砥砺前行的思想自觉与行动自觉。', voice:'通过这次宣讲，我对二十届四中全会精神有了更深刻的理解，也更加坚定了将理论学习转化为实际行动的决心。——彭颖', link:'https://zzb.hust.edu.cn/info/1740/6262.htm' },
          { title:'2026年3月联合主题党日暨政绩观专题读书会', sub:'读书分享 · 交流研讨', thumb:'images/zhu/zhu_22.png', full:'images/zhu/zhu_22.png', time:'2026年3月27日', location:'水电仿真中心三楼投影厅',  intro:'本次联合主题党日与读书会由水利工程专业研究生第六党支部与土木工程专业研究生第六党支部共同举办，于2026年3月27日在水电仿真中心三楼投影厅举行。活动邀请华中科技大学研究生红色理论学讲团讲师开展研读交流。与参会党员结合“对标正确政绩观与两会部署，作为水利学子，我们如何在科研学习与未来工作中践行初心使命、服务国家战略”主题展开深入讨论。现场学习氛围浓厚，大家纷纷表示要将正确政绩观内化于心、外化于行，以扎实的科研本领服务国家水利事业。', voice:'通过这次学习，我更加明确了作为一名水利学子，只有把个人的科研追求融入到国家战略需求中，才是对正确政绩观最真切的践行。——张一帆', link:'https://mp.weixin.qq.com/s/qk_Z7UgQz1_B4RbU5meQHw' },
          { title:'2026年2月联合主题党日', sub:'主题党日 · 理论学习', thumb:'images/zhu/zhu_33.png', full:'images/zhu/zhu_33.png', time:'2026年3月5日', location:'水电仿真中心三楼投影厅', intro:'本次主题党日活动邀请华中科技大学研究生红色理论学讲团讲师作二十届四中全会精神专题宣讲，并由支部夏元昊同志带领学习习近平总书记在省部级主要领导干部学习贯彻党的二十届四中全会精神专题研讨班开班式上的重要讲话、在二十届中央纪委五次全会上的重要讲话精神。在“学精神、明方向、见行动：对标中央部署与榜样力量，我能为‘十五五’开局之年贡献什么？”的支部大讨论中，与会党员结合水利专业实际踊跃发言，现场学习氛围严肃而热烈。活动进一步统一了思想、明确了行动方向，激励大家以实干担当为“十五五”开局贡献青春力量。', voice:'通过这次学习，我深刻领会到作为水利学子，在“十五五”开局之年更应将中央精神转化为科研攻关与日常行动上的自觉践行。——陈江龙', link:'https://mp.weixin.qq.com/s/m0iTLEkP21e_BI-taNRkwg' },
          { title:'2026年1月联合主题党日', sub:'主题党日 · 理论学习', thumb:'images/zhu/zhu_44.png', full:'images/zhu/zhu_44.png', time:'2026年1月22日', location:'华中科技大学"科学精神与实践"讲座20周年纪念展',  intro:'水利工程专业研究生第五、第六党支部联合组织党员、发展对象及入党积极分子，前往华中科技大学“科学精神与实践”讲座20周年纪念展进行参观学习。活动中，党员们通过珍贵展品与影像资料，系统回顾了20年来国内外顶尖科学家来校讲学的精彩瞬间与精神传承，并在参观后开展了支部间交流讨论。大家纷纷表示，要自觉弘扬科学家精神，将个人发展融入国家水利事业与科技自立自强的时代洪流中。', voice:'这次参观让我近距离感受到科学家的报国之志与求实精神，也更明晰了水利学子在科技强国征程中应担当的角色。——张景皓', link:'https://mp.weixin.qq.com/s/M7R4JOVF71oKFY8ZF7W0iA' },
          { title:'2025年12月联合党日', sub:'主题党日 · 理论学习', thumb:'images/zhu/zhu_55.png', full:'images/zhu/zhu_55.png', time:'2025年12月19日', location:'南四教学楼党旗领航教育基地',  intro:'2025年12月19日下午，我支部与外国语学院研究生第一、二党支部在南四教学楼党旗领航教育基地联合开展主题党日活动。党员们共同参观了教育基地，集中学习了党的二十届四中全会精神以及习近平总书记在中共中央政治局第二十三次集体学习时的重要讲话精神。跨学科交流中，水利与外语专业党员围绕如何在各自领域贯彻落实党的创新理论、讲好中国故事、服务国家战略等话题进行深入探讨。现场气氛热烈，既强化了理论武装，也拓宽了支部共建的视野与路径。', voice:'跨支部联学让我体会到，不同专业党员同向同行，才能更好汇聚起服务国家需求的青春合力。——王梦龙', link:'https://mp.weixin.qq.com/s/93Oko5P-K5gH6JY9vMnjsA' },
          { title:'2025年10月主题党日', sub:'主题教育 · 学思践悟', thumb:'images/zhu/zhu_77.png', full:'images/zhu/zhu_77.png', time:'2025年10月28日', location:'水电仿真中心三楼投影厅',  intro:'本次活动于2025年10月28日在水电仿真中心三楼会议室举行。在完成党费缴纳后，由王普瑞同志领学了党的二十届四中全会精神与《中国共产党思想政治工作条例》的核心要义，重点解读了全会关于“十五五”时期经济社会发展的战略部署以及思想政治工作作为“一切工作生命线”的定位。在随后的支部大讨论中，与会党员结合水利专业实际，围绕如何将全会精神融入科研攻关、如何以思想政治工作引领学术诚信等议题进行了深入交流。现场学习氛围浓厚，大家一致表示要以更高标准筑牢思想根基，将理论学习成果转化为服务国家水利事业的行动自觉。', voice:'通过这次学习，我更加深刻认识到思想政治工作是科研工作的“定盘星”，只有筑牢思想根基，才能在科研攻关中行稳致远。——王军辉', link:'无' },
          { title:'第四期领航大讲堂', sub:'主题教育 · 学思践悟', thumb:'images/zhu/zhu_88.png', full:'images/zhu/zhu_88.png', time:'2025年10月至2026年1月', location:'水电仿真中心投影厅',  intro:'2025年10月至2026年1月，华中科技大学党员基本培训“领航大讲堂”第三期、第四期相继开讲。第三期邀请教育部党组书记、部长怀进鹏作“深入学习贯彻习近平总书记关于教育的重要论述 以教育强国支撑引领中国式现代化”专题报告；第四期邀请国家最高科学技术奖获得者、南方科技大学校长薛其坤院士以“追求卓越 矢志报国——在新征程上践行共产党员的初心与使命”为题授课。全校累计6万余人次师生党员在近800个分会场同步学习，学习热情高涨、反响热烈。两场报告从教育强国战略到科学家报国情怀，为师生党员注入了强劲的思想动力。', voice:'两期领航大讲堂让我深刻认识到，无论是教育强国还是科研报国，共产党员的初心使命就体现在“追求卓越、矢志报国”的每一步行动中。——赵仕超', link:'https://news.hust.edu.cn/info/1002/56840.htm' },
          { title:'党史晚读和党史观影活动', sub:'主题教育 · 学思践悟', thumb:'images/zhu/zhu_99.png', full:'images/zhu/zhu_99.png', time:'2026年4月1日', location:'水仿三楼会议室和水仿三楼投影厅',  intro:'为深入贯彻落实党史学习教育常态化长效化要求，2026年4月1日，土木与水利工程学院研究生党建工作中心在水电仿真中心三楼会议室与投影厅，同步举办了党史晚读与党史观影活动。其中，党史观影环节选映了主旋律传记电影《雷锋的微笑》——该片从毛泽东主席回忆雷锋生前一张张可敬可爱的微笑照片开始，讲述了雷锋从一名普通战士成长为全军全国人民共同学习榜样的历程。影片生动刻画了雷锋爱岗敬业、助人为乐、乐观向上的青春形象，映照着习近平总书记所指出的——“雷锋精神是永恒的，是社会主义核心价值观的生动体现”。活动现场，同学们聚精会神，为雷锋在平凡岗位上的坚守与奉献深深动容。雷锋所展现出的爱党爱国爱社会主义的崇高信仰、干一行爱一行的敬业精神、服务人民的奉献情怀，深深感染了每一位水利学子。此次党史观影活动进一步激发了大家的历史责任感和时代使命感，取得了良好的育人实效。', voice:'雷锋用短暂一生践行的“螺丝钉精神”，让我更加坚定了扎根水利、甘于奉献、在平凡岗位上书写不平凡青春的决心。——张欣宇', link:'https://mp.weixin.qq.com/s/N0gq8gieZro-69Jw1tz4fA' }
        ]
      },
      {
        id: 'li',
        name: '砺剑 · 科研报国',
        short: '砺剑',
        color: '#2563eb',
        icon: '砺',
        navBg: '',
        desc: '聚焦科学家精神传承与水电工程一线科研实践，展现支部成员把专业研究融入国家需求和重大工程建设的责任担当',
        audio: 'audio/li/li.mp3',
        photos: [
          { title:'“传承科学家精神，争做新时代先锋”', sub:'主题教育 · 学思践悟', thumb:'images/li/li_1.jpg', full:'images/li/li_1.jpg', time:'2026年1月22日', location:'水仿三楼投影厅', introFile:'data/li/li_1_intro.txt', intro:'为共同感悟科研工作者的实践初心与使命，激励支部同志，将个人发展融入国家需求，增强在专业领域勇攀高峰、服务社会的责任意识，并促进支部间优势互补、经验互鉴与资源共享，我支部联合水利工程专业研究生第五党支部共同开展主题党日活动，活动将组织参观华中科技大学"科学精神与实践"讲座20周年纪念展并开展支部交流。', voice:'此次党日活动令我深受启迪，深切体悟科研工作者的初心与家国担当。我将立足水利专业，把个人发展融入国家需求，传承科学精神，潜心钻研、勇担使命、服务社会', link:'https://tv.cctv.com/2025/12/31/VIDEHOlDrLTPrfK2K06cPtrp251231.shtml' },
          { title:'深耕生产一线，传承红色基因——赴溪洛渡水电站完成科研任务', sub:'主题教育 · 学思践悟', thumb:'images/li/li_2.jpg', full:'images/li/li_2.jpg', time:'2025年3月-2025年6月', location:'溪洛渡水电站', intro:'为推动科研理论与一线生产实践深度融合，课题组赴溪洛渡水电站开展实地科研试验。团队深入机组设备核心区域，扎根转轮室、导叶拐臂、蜗壳、尾水管等关键要害部位，精细布设传感监测设备，全方位精准采集机组运行工况数据。潜心研判波形规律、甄别设备异常征兆、溯源分析故障信号，以传感感知摸清设备运行 “脉搏”，用专业数据研判守住机组安全底线。新时代水电人肩负双碳转型使命，坚持研产同心、实干攻坚，以科技创新夯实防汛发电根基，以深耕实干赋能绿色能源高质量发展。', voice:'深入溪洛渡水电站一线开展科研实践，我真切感悟到水电人的坚守与担当。今后我将传承红色基因，深耕专业科研，立足水利领域，以实干助力绿色能源与国家工程建设。', link:'' },
          { title:'记录一线奋斗瞬间，传承水电红色薪火——赴乌东德水电站完成科研任务', sub:'主题教育 · 学思践悟', thumb:'images/li/li_3.jpg', full:'images/li/li_3.jpg', time:'2026年3月-2025年5月', location:'乌东德水电站', intro:'为推动科研理论与工程生产实践深度融合，课题组赴乌东德水电站开展专项实地科研试验。团队深入水轮机内部核心关键区域，规范布设、精准安装动应力传感器，持续监测机组各类工况下的受力变化与运行特征，系统采集实测数据、分析运行规律，为水轮机状态评估、故障预警及健康诊断提供坚实数据支撑，以科研实干护航大国水电工程安全稳定运行。', voice:'深入乌东德水电一线开展科研实践，我深切体悟大国工程魅力与水电人奋斗精神。今后将坚守科研初心，深耕专业领域，传承红色薪火，以科研力量赋能水利绿色发展。', link:'' }
        ]
      },
      {
        id: 'nuan',
        name: '暖心 · 服务为民',
        short: '暖心',
        color: '#ea580c',
        icon: '暖',
        desc: '聚焦实验室服务、反诈宣传、社区志愿、校园劳动与助老实践，体现支部立足身边、服务群众的温度与行动力',
        audio: 'audio/nuan/nuan.mp3',
        photos: [
          { title:'2025年4月实验室志愿服务主题活动', sub:'志愿实践 · 服务群众',thumb:'images/nuan/nuan_1.jpg', full:'images/nuan/nuan_1.jpg', time:'2025年4月25日', location:'水电楼、水电能源仿真中心实验室', intro:'本次活动由水利工程专业研究生第六党支部联合水电研究生第一党支部、水电研究生第一团支部、水电研究生第七团支部共同开展，主题为“建设实验室，志愿在行动”。活动主要内容包括：对水电楼及水电能源仿真中心实验室进行桌椅搬迁、物资整理及环境卫生清扫。同学们分工协作，搬运重物、擦拭设备、清理死角，确保实验室环境整洁有序，为师生创造更好的科研教学条件。', voice:'通过参加这次“建设实验室，志愿在行动”主题活动，我切身体会到“实验室是我家，维护靠大家”的责任感。搬桌椅、清垃圾、擦实验台，这些活儿听起来简单，但真正干起来并不轻松。大家喊着口号一起抬重物，女生负责整理零碎物品，男生主动扛大件桌椅，汗流浃背却干劲十足。看着原本有些杂乱的实验室变得窗明几净、物品归位，心里特别有成就感。这次活动让我明白，科研不只是埋头做实验，维护好我们每天使用的环境同样是分内之事。志愿服务不在大小，而在用心——把实验室当成自己的家来爱护，就是最实在的党员行动。', link:'' },
          { title:'反诈情景剧《论文陷阱与AI龙虾连环骗局》', sub:'志愿实践 · 服务群众',thumb:'images/nuan/nuan_2.jpg', full:'images/nuan/nuan_2.jpg', time:'2026年4月23日 下午', location:'西六楼五楼报告厅（516）', intro:'本次活动由华中科技大学土木与水利工程学院水利工程专业研究生第六党支部与研究生党建工作中心联合开展。首先，校研究生红色理论学讲团苏志祥领学党的二十届四中全会精神，围绕“十五五”时期战略使命，系统阐释全会背景、核心内容与实践要求。随后，支部宣传委员白芸惠讲解反诈防骗严峻现状、防诈核心技巧及应急处理策略；支部党员与中心成员还现场演绎了诈骗情景短剧，并设置互动提问环节。最后，学院党委书记李斌总结讲话，结合“十五五”规划强调科技安全，并讲授反诈、实验室规范、学术诚信等风险防范方法。', voice:'通过本次主题党日活动，我深刻认识到将理论学习与安全实践相结合的重要性。二十届四中全会精神的学习，让我更加明确个人科研与成长必须融入国家发展大局；而反诈情景剧和互动问答，则直观提升了我在日常生活中的风险辨识与自我保护能力。尤其是李斌书记关于科技“双刃剑”效应的阐述，让我意识到安全责任无处不在。今后我会更主动学习防范知识，并在支部、班级中积极传播，共同筑牢校园安全防线。', link:'https://mp.weixin.qq.com/s/slUTK_Wu1K8lNSPtU_s_8A' },
          { title:'2026年4月社区志愿服务与反诈宣传活动', sub:'志愿实践 · 服务群众',thumb:'images/nuan/nuan_3.jpg', full:'images/nuan/nuan_3.jpg',time:'2026年4月17日（周五）9:30', location:'关山口社区居委会（鼓风小区内），武汉市洪山区关山街鼓风小区', intro:'本次活动由水利工程专业研究生第六党支部组织，主要内容包括两项：一是面向社区居民开展反诈防骗宣传，通过发放宣传单、案例讲解等方式帮助居民提升防范意识；二是协助社区进行环境卫生清扫，清理公共区域垃圾、整理杂物。活动旨在将志愿服务与安全教育相结合，发挥研究生党员服务基层的先锋模范作用。', voice:'通过这次“反诈宣传+环境清扫”相结合的社区志愿服务，我对党员服务群众的多元形式有了更深的体会。上午九点半到达鼓风小区，大家分成两组——一组拿着反诈宣传单走访居民，耐心讲解最新诈骗套路；另一组拿起扫帚和垃圾钳，清理楼道和花坛里的杂物。我分在宣传组，给一位老奶奶讲解如何识别冒充公检法的诈骗电话时，她拉着我的手说“以前接到这种电话差点上当，现在知道了”。那一刻我感受到，简单的几句提醒或许就能帮一个家庭避免损失。当清扫组的同学推着满满一车垃圾走过时，路过的居民也竖起了大拇指。这次活动让我明白，志愿服务既可以“动口”也能“动手”，只要心里装着群众，哪里都是践行初心的阵地。', link:'https://mp.weixin.qq.com/s/LbV3b75FNWwxiHDVVblk7g' },
          { title:'社区清扫志愿服务', sub:'志愿实践 · 服务群众',thumb:'images/nuan/nuan_4.jpg', full:'images/nuan/nuan_4.jpg', time:'2026年3月20日（周五）15:00', location:'关山口社区居委会（鼓风小区内），武汉市洪山区关山街鼓风小区', intro:'本次活动由土木与水利工程学院研究生党建工作中心实践部联合多个党支部组织开展。3月20日下午，支部成员前往关山口社区进行环境卫生清扫志愿服务。活动内容包括清理路面垃圾、整理公共区域等。完整参与者可获得党员成长积分2分。活动旨在弘扬雷锋精神，增强研究生党员的服务意识和劳动观念，用实际行动为社区环境美化贡献力量。', voice:'通过参与这次社区清扫志愿服务，我亲身感受到了劳动的光荣和奉献的价值。拿起扫帚和垃圾夹，和同学们一起弯腰清理每一个角落，虽然汗水湿透了衣背，但看到原本杂乱的社区变得干净整洁，听到路过的居民说“谢谢你们”，内心的充实感无法言喻。这次活动让我对“雷锋精神”有了更实在的理解——它不在口号里，而在一次次扫地、一次次弯腰中。把“为人民服务”落实到最普通的清扫工作里，就是最好的党员教育。未来我会继续参加这样的志愿服务，在劳动中锤炼党性。', link:'https://mp.weixin.qq.com/s/-KNy8vl5efHer0rjKCNPhg' },
          { title:'“学习模范事迹 文明实践谱新篇”校园志愿服务', sub:'志愿实践 · 服务群众', thumb:'images/nuan/nuan_5.jpg', full:'images/nuan/nuan_5.jpg',time:'2026年3月16日（周一）16:00—17:30', location:'主校区青年园胡吉伟纪念碑前', intro:'本次活动由土木与水利工程学院组织，水利工程专业研究生第六党支部联合土木工程专业研究生第六党支部共同参与。活动内容包括：集中学习胡吉伟等英雄模范事迹；在纪念碑前庄重献花；随后开展美化校园志愿服务，清理青年园及周边环境。活动旨在弘扬雷锋精神，引导研究生学模范、践新篇，以实际行动传承红色基因。参与学生可获得德育学分及党员成长积分。', voice:'通过参加这次“学习模范事迹 文明实践谱新篇”校园志愿服务行，我深受教育和触动。在胡吉伟纪念碑前聆听英雄事迹，献上手中的鲜花，内心充满了对榜样的敬意。英雄并非遥不可及，他们用生命和行动诠释了责任与担当。随后的美化校园劳动，让我把这份敬意化为了实实在在的行动——弯腰捡起一片垃圾、擦拭一处栏杆，都是在向模范看齐。这次活动让我明白，学习模范不需要豪言壮语，从身边小事做起，把奉献精神融入日常，就是对英雄最好的纪念。', link:'https://mp.weixin.qq.com/s/IBOD7JvIWUaD9ggqS8SE5g' },
          { title:'“水韵匠心，巧手筑梦”2026年研究生妇女节主题活动', sub:'志愿实践 · 服务群众', thumb:'images/nuan/nuan_6.jpg', full:'images/nuan/nuan_6.jpg',time:'2026年3月8日 晚', location:'紫菘活动中心一楼党员活动室', intro:'本次活动由土木与水利工程学院水利工程专业研究生第六党支部联合研究生党建工作中心举办，主题为“水韵匠心，巧手筑梦”。活动首先由校研究生红色理论学讲团杨淑慧带来《喻家山下的她们——华科大女性力量》专题分享，讲述校园中杰出女性的事迹。随后进入手工创作环节，设有三个板块：扭扭棒花束制作、醒狮灯笼DIY、平安扣挂件编织。同学们在轻松的音乐中动手制作，并分享作品背后的心意——献给导师、母亲或自己。最后全体合影留念，活动在温暖氛围中结束。', voice:'通过这次妇女节主题活动，我深刻体会到组织对女性同学的关怀与尊重。聆听华科大优秀女性的故事，让我看到身边榜样的坚韧与光芒，激励我在科研和生活中更加自信、勇敢。而手工创作环节不仅缓解了平日的科研压力，更让我在专注与交流中感受到集体的温暖。把亲手做的平安扣寄给妈妈，把扭扭棒花束送给导师，这些小小的仪式感让感恩与爱有了具体的形状。未来我也希望继续参与这样“党建+美育”的活动，在忙碌的学习中留住更多温暖瞬间。', link:'https://mp.weixin.qq.com/s/sG1I8PAXL_2qvNAQcsH67w' },
          { title:'“智慧助老，数字赋能”社区实践活动', sub:'服务同学 · 温暖校园', thumb:'images/nuan/nuan_7.jpg', full:'images/nuan/nuan_7.jpg',time:'2026年1月27日 上午', location:'武汉市东湖高新区智苑社区（共享客厅、社区展览馆、老年服务中心）', intro:'本次活动由水利工程专业研究生第六党支部联合“头雁领航”24班共同开展，主题为“智慧助老，数字赋能”。上午9时抵达智苑社区后，同学们首先在工作人员引导下参观社区共享客厅和展览馆，了解该社区从老旧棚改小区到智慧化社区的蝶变历程。随后前往老年服务中心，开展智能手机使用科普教学。支部党员与学员们一对一、手把手辅导老人调节音量亮度、连接Wi-Fi、使用微信视频通话、存储联系人、地图导航等，并反复叮嘱网络安全知识，帮助老年人跨越“数字鸿沟”。', voice:'通过这次走进智苑社区的助老实践活动，我真切感受到了科技温度与基层治理的力量。参观社区展览馆时，看到棚改居民生活翻天覆地的变化，我深刻理解了“人民至上”不是一句口号，而是一件件惠民实事的累积。教一位奶奶用微信和远方的女儿视频通话时，她接通后激动得眼眶泛红，连声说“谢谢孩子”。那一刻，我突然觉得平时觉得简单的手机操作，对老人而言却是一道难以跨越的门槛。我们的耐心多一点，他们的孤独就少一点。这次活动让我明白，研究生的责任不仅在实验室里，更在服务社会的点滴行动中。未来我愿意继续做这样的“小老师”，让更多老人乐享智能生活。', link:'https://mp.weixin.qq.com/s/ZINks5z5Zf1z00ZMDM5FXQ' }

    function makePlaceholder(title, color) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${color}" /><stop offset="100%" stop-color="#ffffff" stop-opacity="0.9" /></linearGradient></defs><rect width="1200" height="900" fill="url(#g)" /><circle cx="180" cy="160" r="90" fill="rgba(255,255,255,0.16)" /><circle cx="1040" cy="220" r="120" fill="rgba(255,255,255,0.12)" /><circle cx="980" cy="740" r="140" fill="rgba(255,255,255,0.10)" /><text x="80" y="760" font-size="72" font-family="Microsoft YaHei, Arial" fill="#ffffff" font-weight="700">${title}</text><text x="82" y="824" font-size="30" font-family="Microsoft YaHei, Arial" fill="#ffffff" opacity="0.9">轻量占位图</text></svg>`;
      return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
    }

    async function resolveTextFile(path, fallback) {
      if (!path) return fallback || '';
      try {
        const res = await fetch(path, { cache: 'force-cache' });
        if (res.ok) return await res.text();
      } catch (e) {}
      return fallback || '';
    }

    const navGrid = document.getElementById('navGrid');
    const themeContainer = document.getElementById('themeContainer');
    const postList = document.getElementById('postList');
    const modal = document.getElementById('modal');
    const modalBody = document.getElementById('modalBody');
    const closeBtn = document.getElementById('closeBtn');
    const themeAudio = document.getElementById('themeAudio');

    themeConfig.forEach(theme => {
      const nav = document.createElement('a');
      nav.className = 'nav-card';
      nav.href = `#${theme.id}`;

      const navBg = theme.navBg
        ? `<div class="nav-bg" style="background-image:url('${theme.navBg}')"></div><div class="nav-overlay"></div>`
        : `<div class="nav-bg" style="background:linear-gradient(135deg, ${theme.color}, #ffffff)"></div><div class="nav-overlay" style="background:linear-gradient(rgba(0,0,0,.12),rgba(0,0,0,.30))"></div>`;

      nav.innerHTML = `
        ${navBg}
        <div class="nav-content">
          <span class="nav-tag" style="background:${theme.color}">${theme.icon}</span>
          <h3>${theme.short}</h3>
          <p>${theme.desc}</p>
          <div class="jump">点击查看 →</div>
        </div>`;
      navGrid.appendChild(nav);

      const section = document.createElement('section');
      section.className = 'theme-card';
      section.id = theme.id;
      section.innerHTML = `
        <div class="theme-header">
          <div class="theme-title-wrap">
            <span class="theme-badge" style="background:${theme.color}">${theme.icon}</span>
            <div>
              <h3>${theme.name}</h3>
              <p>${theme.desc}</p>
            </div>
          </div>
        </div>
        <div class="photo-wall"></div>
        ${theme.video ? `
          <div class="video-box" id="video-box-${theme.id}">
            <h4>视频展示区：${theme.video.title}</h4>
            <p class="video-desc">加载中...</p>
            <div class="video-poster-wrap" data-video-src="${theme.video.src}" data-video-poster="${theme.video.poster}">
              <img src="${theme.video.poster}" alt="视频封面" loading="lazy">
              <div class="video-play-btn">点击加载并播放视频</div>
            </div>
          </div>` : ''}`;

      const wall = section.querySelector('.photo-wall');

      theme.photos.forEach(photo => {
        const item = document.createElement('article');
        item.className = 'photo-item';
        const imgSrc = photo.thumb ? photo.thumb : makePlaceholder(photo.title, theme.color);
        item.innerHTML = `
          <img src="${imgSrc}" loading="lazy" alt="${photo.title}">
          <div class="photo-meta">
            <div class="photo-title">${photo.title}</div>
            <div class="photo-sub">${photo.sub}</div>
          </div>`;
        const imgEl = item.querySelector('img');
        imgEl.addEventListener('error', () => { imgEl.src = makePlaceholder(photo.title, theme.color); }, { once: true });
        item.addEventListener('click', () => openModal(theme, photo));
        wall.appendChild(item);
      });

      if (theme.video && theme.video.descFile) {
        setTimeout(async () => {
          const box = document.querySelector(`#video-box-${theme.id} .video-desc`);
          if (box) box.textContent = await resolveTextFile(theme.video.descFile, theme.video.desc || '');
        }, 0);
      }

      themeContainer.appendChild(section);
    });

    document.querySelectorAll('.video-poster-wrap').forEach(box => {
      box.addEventListener('click', () => {
        const src = box.dataset.videoSrc;
        const poster = box.dataset.videoPoster;
        box.outerHTML = `
          <video controls preload="metadata" poster="${poster}">
            <source src="${src}" type="video/mp4">
            您的浏览器不支持视频播放。
          </video>`;
      }, { once: true });
    });

    posts.forEach(post => {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.innerHTML = `
        <div class="post-date">${post.date}</div>
        <div class="post-main">
          <h4><a href="${post.url}" target="_blank" rel="noopener noreferrer">${post.title}</a></h4>
          <p>${post.intro}</p>
        </div>
        <a class="post-link" href="${post.url}" target="_blank" rel="noopener noreferrer">阅读全文 →</a>`;
      postList.appendChild(card);
    });

    function playThemeAudio(audioSrc) {
      return;
    }

    function stopModalMedia() {
      modalBody.querySelectorAll('audio, video').forEach(media => {
        try {
          media.pause();
          media.currentTime = 0;
          media.removeAttribute('src');
          media.querySelectorAll('source').forEach(source => source.removeAttribute('src'));
          media.load();
        } catch (e) {}
      });
    }

    async function openModal(theme, photo) {
      stopModalMedia();
      const linkHtml = photo.link
        ? `<a href="${photo.link}" target="_blank" rel="noopener noreferrer">点击阅读完整推文</a>`
        : '暂无相关推文';
      const imgSrc = photo.full ? photo.full : makePlaceholder(photo.title, theme.color);
      const introText = await resolveTextFile(photo.introFile, photo.intro || '');

      modalBody.innerHTML = `
        <img class="modal-image" src="${imgSrc}" alt="${photo.title}" onerror="this.src='${makePlaceholder(photo.title, theme.color)}'">
        <div class="meta-grid">
          <div class="meta-item"><div class="label">活动时间</div><div class="value">${photo.time}</div></div>
          <div class="meta-item"><div class="label">活动地点</div><div class="value">${photo.location}</div></div>
        </div>
        <div class="text-box">
          <h5>活动简介</h5>
          <div>${introText}</div>

        </div>
        <div class="voice-box">
          <h5>党员心声</h5>
          <div>${photo.voice}</div>
        </div>
        <div class="audio-box">
          <h5>板块背景音乐</h5>
          <audio controls preload="none" autoplay>
            <source src="${theme.audio}" type="audio/mpeg">
            您的浏览器不支持音频播放。
          </audio>
        </div>
        <div class="link-box">
          <h5>相关推文</h5>
          <div>${linkHtml}</div>
        </div>`;

      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      stopModalMedia();
      themeAudio.pause();
      themeAudio.currentTime = 0;
      themeAudio.removeAttribute('src');
      themeAudio.load();
      modal.classList.remove('show');
      document.body.style.overflow = '';
      modalBody.innerHTML = '';
    }

    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
