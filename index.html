<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>江河之上·党旗之下</title>
  <style>
    :root {
      --red-1: #8b0000;
      --red-2: #c1121f;
      --red-3: #d62828;
      --gold: #d4a017;
      --blue: #1d4ed8;
      --orange: #ea580c;
      --green: #15803d;
      --red: #b91c1c;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --card: #ffffff;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      --radius: 18px;
      --maxw: 1180px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { margin: 0; font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif; color: var(--text); background: linear-gradient(180deg, #fff8f7 0%, #fff 28%, #fff 100%); }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    .hero { min-height: 92vh; display:flex; align-items:center; justify-content:center; text-align:center; padding:40px 20px; color:#fff; background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.15), transparent 28%),
      radial-gradient(circle at 80% 10%, rgba(255,255,255,0.10), transparent 24%),
      linear-gradient(135deg, var(--red-1), var(--red-2) 50%, var(--red-3)); position:relative; overflow:hidden; }
    .hero::after { content:""; position:absolute; inset:auto -10% -120px -10%; height:220px; background:rgba(255,255,255,0.08); transform:rotate(-3deg); filter:blur(10px); }
    .hero-inner { max-width:960px; position:relative; z-index:1; }
    .hero .eyebrow { letter-spacing:0.35em; font-size:14px; opacity:0.9; margin-bottom:18px; }
    .hero h1 { margin:0 0 16px; font-size:clamp(34px, 6vw, 68px); line-height:1.1; font-weight:800; }
    .hero .subtitle { margin:0 auto 14px; font-size:clamp(18px, 2.2vw, 28px); opacity:0.95; }
    .hero .slogan { margin:24px auto 0; display:inline-block; padding:12px 20px; border:1px solid rgba(255,255,255,0.24); border-radius:999px; background:rgba(255,255,255,0.08); backdrop-filter:blur(6px); font-size:15px; }
    .container { width:min(var(--maxw), calc(100% - 32px)); margin:0 auto; }
    .section { padding:56px 0 18px; }
    .section-title { display:flex; align-items:center; gap:14px; margin-bottom:18px; }
    .section-title h2 { margin:0; font-size:clamp(24px, 3vw, 34px); }
    .section-title .line { flex:1; height:1px; background:linear-gradient(90deg, rgba(185,28,28,0.4), rgba(185,28,28,0)); }
    .section-desc { margin:0 0 24px; color:var(--muted); line-height:1.8; }
    .nav-grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:16px; }
    .nav-card { background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:22px 18px; border:1px solid #f1f5f9; transition:transform .25s ease, box-shadow .25s ease; display:flex; flex-direction:column; gap:10px; min-height:180px; }
    .nav-card:hover { transform:translateY(-4px); box-shadow:0 16px 38px rgba(0,0,0,0.12); }
    .nav-tag { width:54px; height:54px; border-radius:16px; display:inline-flex; align-items:center; justify-content:center; color:#fff; font-size:24px; font-weight:700; }
    .nav-card h3 { margin:4px 0 0; font-size:22px; }
    .nav-card p { margin:0; color:var(--muted); line-height:1.7; font-size:14px; }
    .jump { margin-top:auto; color:var(--red-2); font-weight:700; font-size:14px; }
    .theme-card { background:var(--card); border-radius:22px; box-shadow:var(--shadow); padding:24px; margin-bottom:22px; border:1px solid #f6e9e7; }
    .theme-header { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:18px; }
    .theme-title-wrap { display:flex; align-items:center; gap:14px; }
    .theme-badge { width:52px; height:52px; border-radius:16px; color:#fff; display:inline-flex; align-items:center; justify-content:center; font-size:24px; font-weight:800; flex-shrink:0; }
    .theme-header h3 { margin:0 0 6px; font-size:28px; }
    .theme-header p { margin:0; color:var(--muted); line-height:1.8; }
    .photo-wall { columns:3 280px; column-gap:16px; }
    .photo-item { break-inside:avoid; margin-bottom:16px; background:#fff; border-radius:18px; overflow:hidden; border:1px solid #eef2f7; box-shadow:0 8px 20px rgba(0,0,0,0.06); cursor:pointer; transition:transform .22s ease, box-shadow .22s ease; }
    .photo-item:hover { transform:translateY(-3px); box-shadow:0 14px 26px rgba(0,0,0,0.10); }
    .photo-item img { width:100%; aspect-ratio:4 / 3; object-fit:cover; background:#f8fafc; }
    .photo-meta { padding:14px 14px 16px; }
    .photo-title { font-size:16px; font-weight:700; margin-bottom:6px; line-height:1.5; }
    .photo-sub { color:var(--muted); font-size:13px; line-height:1.6; }
    .posts-wrap { display:grid; gap:14px; }
    .post-card { background:#fff; border:1px solid #eef2f7; border-radius:16px; padding:18px; box-shadow:0 8px 18px rgba(0,0,0,0.05); display:grid; grid-template-columns:120px 1fr auto; gap:16px; align-items:center; }
    .post-date { color:var(--muted); font-weight:700; }
    .post-main h4 { margin:0 0 8px; color:var(--blue); font-size:18px; }
    .post-main p { margin:0; color:var(--muted); line-height:1.7; font-size:14px; }
    .post-link { color:var(--red-2); font-weight:700; white-space:nowrap; }
    .footer { margin-top:40px; padding:28px 0 46px; color:var(--muted); border-top:1px solid var(--line); text-align:center; line-height:1.9; }
    .modal { position:fixed; inset:0; background:rgba(0,0,0,0.56); display:none; align-items:center; justify-content:center; padding:20px; z-index:999; }
    .modal.show { display:flex; }
    .modal-card { width:min(920px,100%); max-height:90vh; overflow:auto; background:#fff; border-radius:24px; box-shadow:0 24px 60px rgba(0,0,0,0.24); position:relative; }
    .close-btn { position:sticky; top:14px; margin-left:auto; margin-right:14px; width:42px; height:42px; border:0; border-radius:50%; background:rgba(255,255,255,0.95); box-shadow:0 6px 18px rgba(0,0,0,0.15); cursor:pointer; font-size:22px; z-index:10; }
    .modal-body { padding:0 22px 26px; }
    .modal-image { width:100%; aspect-ratio:16 / 9; object-fit:cover; border-radius:18px; background:#f8fafc; margin-top:-10px; }
    .meta-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px 18px; margin:18px 0 8px; }
    .meta-item { background:#fafafa; border:1px solid #f0f0f0; border-radius:14px; padding:12px 14px; }
    .meta-item .label { color:var(--muted); font-size:13px; margin-bottom:6px; }
    .meta-item .value { font-size:15px; line-height:1.7; }
    .voice-box { margin-top:14px; background:linear-gradient(135deg, #fff7ed, #fff); border:1px solid #ffedd5; border-radius:16px; padding:16px 18px; line-height:1.85; }
    .voice-box h5, .text-box h5, .link-box h5 { margin:0 0 10px; font-size:16px; }
    .text-box { margin-top:14px; background:#fff; border:1px solid #eef2f7; border-radius:16px; padding:16px 18px; line-height:1.85; }
    .link-box { margin-top:14px; background:#f8fafc; border:1px dashed #cbd5e1; border-radius:16px; padding:16px 18px; }
    .link-box a { color:var(--blue); font-weight:700; }
    @media (max-width: 980px) {
      .nav-grid { grid-template-columns:repeat(2, 1fr); }
      .post-card { grid-template-columns:1fr; }
      .meta-grid { grid-template-columns:1fr; }
    }
    @media (max-width: 640px) {
      .hero { min-height:78vh; }
      .nav-grid { grid-template-columns:1fr; }
      .theme-card { padding:18px; }
      .theme-header { flex-direction:column; }
      .photo-wall { columns:1; }
      .modal-body { padding:0 14px 18px; }
    }
  </style>
</head>
<body>
  <header class="hero" id="top">
    <div class="hero-inner">
      <div class="eyebrow">WATER · PARTY · YOUTH</div>
      <h1>江河之上·党旗之下</h1>
      <p class="subtitle">水利工程专业研究生第六党支部风采展</p>

  </main>
  <footer class="footer">
    <div class="container">

      <div><a href="#top" style="color:#b91c1c;font-weight:700;">返回顶部</a></div>

  </footer>
  <div class="modal" id="modal"><div class="modal-card"><button class="close-btn" id="closeBtn" aria-label="关闭">×</button><div class="modal-body" id="modalBody"></div></div></div>
  <script>
    const themeConfig = [
      {id:'zhu',name:'铸魂 · 思想领航',short:'铸魂',color:'#d4a017',icon:'铸',desc:'聚焦主题党日、理论学习、读书分享和微党课，展示党员在深学细悟中筑牢信仰之基。',photos:[
        {title:'主题党日集中学习',sub:'理论学习 · 研讨交流',time:'2026年4月1日',location:'学院会议室',intro:'围绕党的创新理论开展集中学习和交流研讨，进一步强化理论武装。',voice:'通过系统学习，我更加深刻地认识到理论学习不是“任务”，而是坚定信念、指导实践的根本。——支部党员 张同学',link:'https://mp.weixin.qq.com/'},
        {title:'晚读活动与党史分享',sub:'读书分享 · 党史学习',time:'2026年1月6日',location:'支部活动室',intro:'通过晚读和主题分享，推动支部成员在读原著、学党史中感悟初心使命。',voice:'党史学习让我更加理解今天的幸福生活来之不易，也更坚定了奋斗方向。——支部党员 李同学',link:''},
        {title:'微党课学习展示',sub:'微党课 · 思想引领',time:'2025年11月',location:'学院报告厅',intro:'以微党课形式分享理论学习体会，推动支部学习形式更加鲜活。',voice:'把理论讲出来、讲明白，也是一次自我提升和信念强化的过程。——支部党员 王同学',link:'https://mp.weixin.qq.com/'}
      ]},
      {id:'li',name:'砺剑 · 科研报国',short:'砺剑',color:'#2563eb',icon:'砺',desc:'聚焦实验室科研、项目调研、成果汇报与学术讨论，展示把论文写在祖国大地上的专业担当。',photos:[
        {title:'实验室科研讨论',sub:'科研攻关 · 学术研讨',time:'2026年3月',location:'课题组实验室',intro:'围绕数字孪生流域、洪水推演和多尺度场景构建开展专题讨论。',voice:'科研不仅是完成任务，更是一种将专业能力服务国家需求的责任。——支部党员 赵同学',link:''},

      ]},
      {id:'nuan',name:'暖心 · 服务为民',short:'暖心',color:'#ea580c',icon:'暖',desc:'聚焦志愿服务、社区实践和校园关怀，记录党员走出实验室、服务群众的真实足迹。',photos:[
        {title:'社区志愿服务',sub:'志愿实践 · 服务群众',time:'2026年3月',location:'关山社区',intro:'支部成员走进社区开展志愿服务，以实际行动践行为民服务宗旨。',voice:'服务群众不是一句口号，而是一次次具体而微的行动。——支部党员 刘同学',link:'https://mp.weixin.qq.com/'},
        {title:'反诈情景剧活动',sub:'反诈宣传 · 青春护航',time:'2026年3月8日',location:'校园活动区',intro:'通过情景剧表演普及反诈知识，提升师生安全防范意识。',voice:'把知识讲给更多人听，让服务真正产生价值。——支部党员 孙同学',link:''},
        {title:'校园志愿活动',sub:'服务同学 · 温暖校园',time:'2025年9月',location:'校园主干道',intro:'参与迎新、义务劳动和环境维护等活动，服务校园、服务同学。',voice:'在平凡的小事中也能体现责任与奉献。——支部党员 黄同学',link:''}
      ]},
      {id:'ju',name:'聚力 · 支部同行',short:'聚力',color:'#15803d',icon:'聚',desc:'聚焦支部组织生活、团建联谊和集体活动，呈现支部的凝聚力与向心力。',photos:[
        {title:'联合主题党日',sub:'联合共建 · 支部交流',time:'2026年1月22日',location:'联合党支部活动室',intro:'与兄弟支部联合开展主题党日活动，促进支部之间交流学习。',voice:'在交流中互学互鉴，也更能感受到支部建设的活力。——支部党员 吴同学',link:'https://mp.weixin.qq.com/'},
        {title:'支部团建活动',sub:'团建素拓 · 集体成长',time:'2025年秋季',location:'校园体育场',intro:'通过团建和体育活动增强支部成员之间的沟通协作。',voice:'支部不仅是组织，也是一个温暖、互助、有力量的集体。——支部党员 何同学',link:''},
        {title:'支部集体合影',sub:'组织生活 · 团队风采',time:'2026年4月',location:'学院楼前',intro:'记录支部成员共同成长、共同奋斗的珍贵时刻。',voice:'在集体中找到归属感，也更加明白团结的重要意义。——支部党员 朱同学',link:''}
      ]},
      {id:'chuan',name:'传承 · 红色基因',short:'传承',color:'#b91c1c',icon:'传',desc:'聚焦入党宣誓、红色教育基地参观和革命传统教育，传承红色血脉、赓续精神力量。',photos:[
        {title:'党旗领航教育基地参观',sub:'基地学习 · 红色教育',time:'2026年3月21日',location:'华中科技大学党旗领航教育基地',intro:'通过实地参观学习，重温党的光辉历程，坚定理想信念。',voice:'在沉浸式学习中，我更加感受到信仰的力量和党员身份的责任。——支部党员 郭同学',link:'https://mp.weixin.qq.com/'},
        {title:'入党宣誓仪式',sub:'初心使命 · 庄严承诺',time:'2025年7月',location:'红色教育基地',intro:'面对党旗庄严宣誓，进一步强化党员意识和使命意识。',voice:'誓言不仅要说出来，更要落实到今后的学习、科研和生活中。——支部党员 林同学',link:''},
        {title:'学习英雄校友事迹',sub:'榜样引领 · 精神传承',time:'2026年2月',location:'学院报告厅',intro:'学习优秀校友和先进典型事迹，感悟责任担当与奋斗精神。',voice:'榜样让我更加明确，新时代青年应将个人理想融入国家需要。——支部党员 冯同学',link:''}
      ]}

    const posts = [
      {title:'深学细悟政绩观 知行合一勇担当',date:'2026/04',intro:'围绕理论学习和责任担当开展专题交流，展现支部成员在学思践悟中的成长。',url:'https://mp.weixin.qq.com/'},
      {title:'学雷锋 践初心 勇担当',date:'2026/03',intro:'记录支部成员参与志愿服务和雷锋月实践活动的真实场景与感悟。',url:'https://mp.weixin.qq.com/'},
      {title:'慧眼识诈 · 青春护航',date:'2026/03',intro:'聚焦反诈宣传活动，展示支部在平安校园建设中的主动作为。',url:'https://mp.weixin.qq.com/'},
      {title:'水韵匠心，巧手筑梦',date:'2026/01',intro:'通过特色活动展示支部文化建设和青年党员的风采。',url:'https://mp.weixin.qq.com/'}
    ];
    function makePlaceholder(title, color) {
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="${color}" /><stop offset="100%" stop-color="#ffffff" stop-opacity="0.9" /></linearGradient></defs><rect width="1200" height="900" fill="url(#g)" /><circle cx="180" cy="160" r="90" fill="rgba(255,255,255,0.16)" /><circle cx="1040" cy="220" r="120" fill="rgba(255,255,255,0.12)" /><circle cx="980" cy="740" r="140" fill="rgba(255,255,255,0.10)" /><text x="80" y="760" font-size="72" font-family="Microsoft YaHei, Arial" fill="#ffffff" font-weight="700">${title}</text><text x="82" y="824" font-size="30" font-family="Microsoft YaHei, Arial" fill="#ffffff" opacity="0.9">水利工程专业研究生第六党支部</text></svg>`;
      return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
    }
    const navGrid = document.getElementById('navGrid');
    const themeContainer = document.getElementById('themeContainer');
    const postList = document.getElementById('postList');
    const modal = document.getElementById('modal');
    const modalBody = document.getElementById('modalBody');
    const closeBtn = document.getElementById('closeBtn');
    themeConfig.forEach(theme => {
      const nav = document.createElement('a');
      nav.className = 'nav-card';
      nav.href = `#${theme.id}`;
      nav.innerHTML = `<span class="nav-tag" style="background:${theme.color}">${theme.icon}</span><h3>${theme.short}</h3><p>${theme.desc}</p><div class="jump">点击查看 →</div>`;
      navGrid.appendChild(nav);
      const section = document.createElement('section');
      section.className = 'theme-card';
      section.id = theme.id;
      section.innerHTML = `<div class="theme-header"><div class="theme-title-wrap"><span class="theme-badge" style="background:${theme.color}">${theme.icon}</span><div><h3>${theme.name}</h3><p>${theme.desc}</p></div></div></div><div class="photo-wall"></div>`;
      const wall = section.querySelector('.photo-wall');
      theme.photos.forEach(photo => {
        const item = document.createElement('article');
        item.className = 'photo-item';
        item.innerHTML = `<img src="${makePlaceholder(photo.title, theme.color)}" alt="${photo.title}" /><div class="photo-meta"><div class="photo-title">${photo.title}</div><div class="photo-sub">${photo.sub}</div></div>`;
        item.addEventListener('click', () => openModal(theme, photo));
        wall.appendChild(item);
      });
      themeContainer.appendChild(section);
    });
    posts.forEach(post => {
      const card = document.createElement('div');
      card.className = 'post-card';
      card.innerHTML = `<div class="post-date">${post.date}</div><div class="post-main"><h4><a href="${post.url}" target="_blank" rel="noopener noreferrer">${post.title}</a></h4><p>${post.intro}</p></div><a class="post-link" href="${post.url}" target="_blank" rel="noopener noreferrer">阅读全文 →</a>`;
      postList.appendChild(card);
    });
    function openModal(theme, photo) {
      const linkHtml = photo.link ? `<a href="${photo.link}" target="_blank" rel="noopener noreferrer">点击阅读完整推文</a>` : '暂无相关推文';
      modalBody.innerHTML = `<img class="modal-image" src="${makePlaceholder(photo.title, theme.color)}" alt="${photo.title}" /><div class="meta-grid"><div class="meta-item"><div class="label">活动时间</div><div class="value">${photo.time}</div></div><div class="meta-item"><div class="label">活动地点</div><div class="value">${photo.location}</div></div></div><div class="text-box"><h5>活动简介</h5><div>${photo.intro}</div></div><div class="voice-box"><h5>党员心声</h5><div>${photo.voice}</div></div><div class="link-box"><h5>相关推文</h5><div>${linkHtml}</div></div>`;
      modal.classList.add('show');
      document.body.style.overflow = 'hidden';
    }
    function closeModal() { modal.classList.remove('show'); document.body.style.overflow = ''; }
    closeBtn.addEventListener('click', closeModal);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
  </script>
</body>
</html>
